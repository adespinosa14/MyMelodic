{% extends 'landing_template.html' %}

{% block content %}
<div class="new_page">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"> <a href="{{ url_for('Home') }}"> Home </a> </li>
            <li class="breadcrumb-item active"> {{ family_name }} </li>
        </ol>
    </nav>

    <h1 class="mb-4"> {{ family_name }} </h1>

    <div class="container">
        <div class="row row-cols-1 row-cols-md-3 g-4">
            {% for instrument in instrument_list %}
            <div class="col">
                <div class="card h-100">
                    <img src="https://ouaeswxhnibgvlthhgzx.supabase.co/storage/v1/object/public/Image%20Assets/{{instrument.name|lower}}_card.jpg" class="card_img_cover">
                    <div class="card-body">
                        <h5 class="mb-2"> {{ instrument.name }} </h5>
                        <p class="mb-3"> {{ instrument.description }} </p>
                        <a class="btn primary_text accent_background button_hover_harsh center_object" href="/instrument_family/{{family_name}}/{{instrument.name | replace(' ', '_')}}"> Learn More </a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</div>

{% endblock content %}
